<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soundboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0c0b0f;
    --panel:#18151d;
    --panel-edge:#2a2530;
    --gold:#c9a227;
    --gold-bright:#e8c65a;
    --red:#a3141f;
    --text:#f2ede0;
    --muted:#8f8a97;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse at 50% -10%, #201b26 0%, var(--bg) 55%);
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:32px 20px 60px;
  }

  header{
    text-align:center;
    margin-bottom:28px;
  }
  h1{
    font-family:'Bebas Neue',sans-serif;
    font-size:clamp(2.4rem,7vw,3.6rem);
    letter-spacing:0.08em;
    margin:0;
    line-height:1;
    color:var(--text);
  }
  h1 span{
    color:var(--gold-bright);
    text-shadow:0 0 18px rgba(232,198,90,0.35);
  }
  .subtitle{
    color:var(--muted);
    font-size:0.85rem;
    letter-spacing:0.03em;
    margin-top:8px;
  }

  .toolbar{
    display:flex;
    gap:10px;
    margin-bottom:28px;
    flex-wrap:wrap;
    justify-content:center;
  }
  .toolbar button{
    font-family:'Inter',sans-serif;
    font-size:0.8rem;
    font-weight:600;
    letter-spacing:0.03em;
    text-transform:uppercase;
    padding:10px 18px;
    border-radius:6px;
    border:1px solid var(--panel-edge);
    background:var(--panel);
    color:var(--text);
    cursor:pointer;
    transition:border-color .15s ease, transform .1s ease;
  }
  .toolbar button:hover{border-color:var(--gold);}
  .toolbar button:active{transform:scale(0.97);}
  .toolbar button.stop{
    border-color:var(--red);
    color:#ffb3b8;
  }
  .toolbar button.stop:hover{background:rgba(163,20,31,0.15);}

  .grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:14px;
    width:100%;
    max-width:720px;
  }
  @media (max-width:560px){
    .grid{grid-template-columns:repeat(2,1fr);}
  }

  .pad{
    position:relative;
    aspect-ratio:1/0.85;
    border-radius:10px;
    border:1px solid var(--panel-edge);
    background:linear-gradient(180deg,#1c1922 0%,#151319 100%);
    color:var(--text);
    cursor:pointer;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:6px;
    font-family:'Inter',sans-serif;
    transition:border-color .12s ease, transform .08s ease, box-shadow .12s ease;
    outline-offset:2px;
  }
  .pad:hover{border-color:var(--gold);}
  .pad:active{transform:scale(0.96);}
  .pad:focus-visible{outline:2px solid var(--gold-bright);}

  .pad .num{
    font-family:'Bebas Neue',sans-serif;
    font-size:1.6rem;
    letter-spacing:0.05em;
    color:var(--gold);
  }
  .pad .key{
    font-size:0.7rem;
    color:var(--muted);
    letter-spacing:0.05em;
  }
  .pad .name{
    font-size:0.72rem;
    color:var(--muted);
    letter-spacing:0.02em;
  }
  .pad .missing{
    font-size:0.65rem;
    color:#7a5a5a;
  }

  .pad.playing{
    border-color:var(--gold-bright);
    box-shadow:0 0 0 1px var(--gold-bright), 0 0 24px rgba(232,198,90,0.35);
  }
  .pad.playing .num{color:var(--gold-bright);}

  .pad.error{
    border-color:rgba(163,20,31,0.5);
    opacity:0.5;
    cursor:not-allowed;
  }

  @media (prefers-reduced-motion:reduce){
    .pad{transition:none;}
  }

  footer{
    margin-top:36px;
    color:var(--muted);
    font-size:0.75rem;
    text-align:center;
    max-width:520px;
    line-height:1.5;
  }
  code{
    background:var(--panel);
    border:1px solid var(--panel-edge);
    padding:2px 6px;
    border-radius:4px;
    font-size:0.72rem;
  }
</style>
</head>
<body>

<header>
  <h1>SOUND<span>!</span>BOARD</h1>
  <div class="subtitle">Klicke ein Pad oder drücke die zugehörige Taste</div>
</header>

<div class="toolbar">
  <button class="stop" id="stopAll">■ Alles stoppen</button>
</div>

<div class="grid" id="grid"></div>

<footer>
  Erwartet Dateien unter <code>/sounds/sound1.wav</code> bis <code>/sounds/sound16.wav</code>.
  Ein Pad bleibt ausgegraut, wenn die Datei fehlt.
</footer>

<script>
  // ---- Hier Namen eintragen ----
  // "file" muss zur echten Datei in /sounds/ passen.
  // "name" ist der Text, der auf dem Pad angezeigt wird.
  const SOUNDS = [
    { file: 'sound1.wav',  name: 'Sound 1'  },
    { file: 'sound2.wav',  name: 'Sound 2'  },
    { file: 'sound3.wav',  name: 'Sound 3'  },
    { file: 'sound4.wav',  name: 'Sound 4'  },
    { file: 'sound5.wav',  name: 'Sound 5'  },
    { file: 'sound6.wav',  name: 'Sound 6'  },
    { file: 'sound7.wav',  name: 'Sound 7'  },
    { file: 'sound8.wav',  name: 'Sound 8'  },
    { file: 'sound9.wav',  name: 'Sound 9'  },
    { file: 'sound10.wav', name: 'Sound 10' },
    { file: 'sound11.wav', name: 'Sound 11' },
    { file: 'sound12.wav', name: 'Sound 12' },
    { file: 'sound13.wav', name: 'Sound 13' },
    { file: 'sound14.wav', name: 'Sound 14' },
    { file: 'sound15.wav', name: 'Sound 15' },
    { file: 'sound16.wav', name: 'Sound 16' },
  ];
  // -------------------------------

  const KEYS = ['1','2','3','4','5','6','7','8','9','0','Q','W','E','R','T','Y'];
  const grid = document.getElementById('grid');
  const pads = [];

  SOUNDS.forEach((sound, idx) => {
    const i = idx + 1;
    const file = `sounds/${sound.file}`;
    const audio = new Audio(file);
    audio.preload = 'none';

    const pad = document.createElement('button');
    pad.className = 'pad';
    pad.setAttribute('aria-label', `${sound.name} abspielen`);
    pad.innerHTML = `
      <div class="num">${i}</div>
      <div class="name">${sound.name}</div>
      <div class="key">Taste: ${KEYS[idx]}</div>
    `;

    let failed = false;
    audio.addEventListener('error', () => {
      failed = true;
      pad.classList.add('error');
      pad.querySelector('.name').innerHTML = `${sound.name} <div class="missing">Datei fehlt: ${sound.file}</div>`;
    });

    const play = () => {
      if (failed) return;
      audio.currentTime = 0;
      audio.play().catch(() => {});
    };
    audio.addEventListener('play', () => pad.classList.add('playing'));
    audio.addEventListener('pause', () => pad.classList.remove('playing'));
    audio.addEventListener('ended', () => pad.classList.remove('playing'));

    pad.addEventListener('click', play);
    grid.appendChild(pad);
    pads.push({ audio, play, key: KEYS[idx] });
  });

  document.addEventListener('keydown', (e) => {
    if (e.repeat) return;
    const tag = document.activeElement.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA') return;
    const k = e.key.toUpperCase();
    const match = pads.find(p => p.key === k);
    if (match) match.play();
  });

  document.getElementById('stopAll').addEventListener('click', () => {
    pads.forEach(p => { p.audio.pause(); p.audio.currentTime = 0; });
  });
</script>

</body>
</html>
